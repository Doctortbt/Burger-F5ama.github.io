<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

#bar {
    position:fixed;
    top:0;
    left:0;
    height:5px;
    width:0%;
    background:red;
    animation:load 3s forwards;
}

@keyframes load {
    from {width:0%;}
    to {width:100%;}
}

/* 👇 التعديل المهم هنا */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(1);
    width:160px;
    animation: zoom 3s forwards;
}

@keyframes zoom {
    0% {
        transform:translate(-50%,-50%) scale(1);
    }
    100% {
        transform:translate(-50%,-50%) scale(1.15);
    }
}
</style>
</head>

<body>

<div id="bar"></div>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

<script>
setTimeout(function(){
    console.log("done loading");
}, 3000);
</script>

</body>
</html>
