<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

/* الصورة فقط تتحرك */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(1);
    width:160px;
    animation: move 3s ease-in-out forwards;
}

/* حركة بسيطة جدًا */
@keyframes move {
    from {
        transform:translate(-50%,-50%) scale(1);
    }
    to {
        transform:translate(-50%,-50%) scale(1.1);
    }
}
</style>
</head>

<body>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

</body>
</html>
