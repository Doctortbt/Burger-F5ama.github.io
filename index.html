<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

/* شريط التحميل */
#bar {
    position:fixed;
    top:0;
    left:0;
    height:5px;
    width:0%;
    background:red;
    animation:load 3s forwards;
}

@keyframes load {
    from {width:0%;}
    to {width:100%;}
}

/* الصورة + الحركة (التعديل الوحيد هنا) */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    width:160px;

    /* مهم: منع التعارض */
    transform:translate(-50%,-50%) scale(1);

    /* حركة تحميل + تكبير بسيط */
    animation: zoom 3s ease-in-out forwards;
}

@keyframes zoom {
    0% {
        transform:translate(-50%,-50%) scale(1);
    }
    100% {
        transform:translate(-50%,-50%) scale(1.08);
    }
}

/* النص */
#text {
    position:absolute;
    top:70%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:Arial;
    color:#333;
}
</style>
</head>

<body>

<div id="bar"></div>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

<div id="text">جارٍ التحميل...</div>

<script>
setTimeout(function(){
    window.location.href = "main.html";
}, 3000);
</script>

</body>
</html>
