<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

/* الصورة فقط */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(1);
    width:160px;
    animation: zoom 3s forwards;
}

/* تكبير بسيط جدًا */
@keyframes zoom {
    from {
        transform:translate(-50%,-50%) scale(1);
    }
    to {
        transform:translate(-50%,-50%) scale(1.1);
    }
}
</style>
</head>

<body>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

</body>
</html>
