
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #1a1a1a, #000);
}

/* خلفية نقاط خفيفة */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity:0.04;
    animation: moveParticles 20s linear infinite;
}

@keyframes moveParticles {
    from {transform: translate(0,0);}
    to {transform: translate(-200px,-200px);}
}

/* شريط التحميل */
#bar {
    position:fixed;
    top:0;
    left:0;
    height:4px;
    width:100%;
    background:linear-gradient(to right, red 50%, transparent 50%);
    background-size:200% 100%;
    animation: moveBar 0.7s linear 2;
}

@keyframes moveBar {
    from {background-position:100% 0;}
    to {background-position:0 0;}
}

/* Glow خفيف */
#glow {
    position:absolute;
    top:50%;
    left:50%;
    width:280px;
    height:280px;
    background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 70%);
    transform:translate(-50%,-50%);
    filter: blur(35px);
}

/* الصورة */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    width:42vw;
    max-width:200px;

    border-radius:50%;
    object-fit:cover;

    transform:translate(-50%,-50%) scale(1);
    opacity:0;

    animation:
        fadeIn 1s ease forwards,
        zoom 2.5s ease forwards,
        pulse 1.5s infinite;

    box-shadow: 0 0 35px rgba(255,0,0,0.35);
}

/* دخول */
@keyframes fadeIn {
    to {opacity:1;}
}

/* تكبير */
@keyframes zoom {
    from {
        transform:translate(-50%,-50%) scale(1);
    }
    to {
        transform:translate(-50%,-50%) scale(1.35);
    }
}

/* نبضة أهدى */
@keyframes pulse {
    0% {box-shadow: 0 0 15px rgba(255,0,0,0.2);}
    50% {box-shadow: 0 0 45px rgba(255,0,0,0.5);}
    100% {box-shadow: 0 0 15px rgba(255,0,0,0.2);}
}

/* انتقال قبل الفتح */
#fade {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    opacity:0;
    transition:0.8s;
}
</style>
</head>

<body>

<div id="bar"></div>
<div id="glow"></div>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

<div id="fade"></div>

<script>
setTimeout(function(){
    document.getElementById("fade").style.opacity = "1";

    setTimeout(function(){
        window.location.href = "main.html";
    }, 800);

}, 1800);
</script>

</body>
</html>
