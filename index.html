
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

/* شريط التحميل */
#bar {
    position:fixed;
    top:0;
    left:0;
    height:5px;
    width:0%;
    background:red;
    animation:load 3s forwards;
}

@keyframes load {
    from {width:0%;}
    to {width:100%;}
}

/* اللوجو */
#logo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:160px;
}

/* نص تحميل */
#text {
    position:absolute;
    top:70%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:Arial;
    color:#333;
}
</style>
</head>

<body>

<div id="bar"></div>

<img id="logo" src="https://cdn.discordapp.com/attachments/1490843957339361314/1497324717906854031/jojojo.png">

<div id="text">جارٍ التحميل...</div>

<script>
setTimeout(function(){
    // بعد 3 ثواني يفتح الصفحة الرئيسية
    window.location.href = "main.html";
}, 3000);
</script>

</body>
</html>
