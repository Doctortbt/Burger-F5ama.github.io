<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- مهم جدًا عشان الموبايل -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>
body {
    margin:0;
    background:white;
    overflow:hidden;
}

/* شريط التحميل */
#bar {
    position:fixed;
    top:0;
    left:0;
    height:5px;
    width:100%;
    background:linear-gradient(to right, red 50%, transparent 50%);
    background-size:200% 100%;
    animation: moveBar 0.7s linear 2;
}

@keyframes moveBar {
    from {background-position:100% 0;}
    to {background-position:0 0;}
}

/* الصورة */
#logo {
    position:absolute;
    top:50%;
    left:50%;

    /* يخلي الحجم مناسب لكل الأجهزة */
    width:40vw;
    max-width:200px;

    border-radius:50%;
    object-fit:cover;

    transform:translate(-50%,-50%) scale(1);
    animation: zoom 3s ease-in-out forwards;
}

/* تكبير */
@keyframes zoom {
    0% {
        transform:translate(-50%,-50%) scale(1);
    }
    100% {
        transform:translate(-50%,-50%) scale(1.4);
    }
}
</style>
</head>

<body>

<div id="bar"></div>

<img id="logo" src="https://i.ibb.co/mFt5J4vr/jojojo.png">

<script>
setTimeout(function(){
    window.location.href = "main.html";
}, 2000);
</script>

</body>
</html>
