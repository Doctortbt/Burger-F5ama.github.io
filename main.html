<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger F5ama</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
    margin:0;
    background:#fff;
    font-family: Arial;
}

/* 🔺 مثلث أحمر احترافي */
.header{
    width:100%;
    height:220px;
    background:#e3001b;
    clip-path: polygon(0 0, 100% 0, 100% 55%, 0 100%);
}

/* الكونتينر */
.container{
    max-width:600px;
    margin:-70px auto 0;
    padding:15px;
}

/* كارت المنيو */
.card{
    background:#fff;
    border-radius:18px;
    padding:10px;
    margin:18px auto;
    width:90%;
    max-width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

/* الصورة */
.card img{
    width:100%;
    height:auto;
    display:block;
    border-radius:12px;

    /* تحسين الشكل */
    filter: contrast(1.1) saturate(1.15) brightness(1.05);
}

/* زر الشير */
.share-container{
    position:fixed;
    bottom:25px;
    right:25px;
}

.share-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:#fff;
    color:#e3001b;
    font-size:22px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    cursor:pointer;
}

/* popup */
.popup{
    display:none;
    position:absolute;
    bottom:75px;
    right:0;
    width:220px;
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.popup.show{
    display:block;
}

.popup a{
    display:block;
    text-decoration:none;
    color:#1877f2;
    font-weight:bold;
    margin-bottom:10px;
}

.phone{
    color:#333;
    font-weight:bold;
    direction:ltr;
}
</style>
</head>

<body>

<!-- 🔺 الهيدر -->
<div class="header"></div>

<!-- 🖼️ المنيو -->
<div class="container">

    <div class="card">
        <img src="https://i.ibb.co/CpJB4CRx/image.png">
    </div>

    <div class="card">
        <img src="https://i.ibb.co/1fFK2LR6/image.png">
    </div>

</div>

<!-- 🔗 الشير -->
<div class="share-container">

    <div id="popup" class="popup">
        <a href="https://www.facebook.com/people/Burger-F5ama/100087456030031/" target="_blank">
            <i class="fab fa-facebook"></i> Burger F5ama
        </a>
        <hr>
        <div class="phone">01229535950</div>
    </div>

    <button class="share-btn" onclick="togglePopup()">
        <i class="fas fa-share-alt"></i>
    </button>

</div>

<script>
function togglePopup(){
    document.getElementById("popup").classList.toggle("show");
}

window.onclick = function(e){
    if(!e.target.closest('.share-container')){
        document.getElementById("popup").classList.remove("show");
    }
}
</script>

</body>
</html>
