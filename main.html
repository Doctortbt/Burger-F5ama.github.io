
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger F5ama</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
  text-align: center;
}

/* صور المنيو */
.menu-img {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  display: block;
  border-radius: 15px;
}

/* زر الشير */
.share-container {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
}

.share-btn {
  background: #ff3b3b;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

.share-box {
  display: none;
  margin-top: 10px;
}

.fb-icon {
  width: 45px;
  cursor: pointer;
}

/* أرقام التليفون */
.phones {
  margin: 30px 0;
}

.phone {
  background: #111;
  color: white;
  margin: 10px auto;
  padding: 12px;
  width: 260px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.phone:hover {
  background: #ff3b3b;
}
</style>
</head>

<body>

<!-- صور المنيو -->
<img src="https://cdn.discordapp.com/attachments/1490843957339361314/1497725368021286984/image.png" class="menu-img">

<img src="https://cdn.discordapp.com/attachments/1490843957339361314/1497726083632463922/Untitled.png" class="menu-img">

<!-- زر الشير -->
<div class="share-container">
  <button onclick="toggleShare()" class="share-btn">🔗</button>

  <div id="shareBox" class="share-box">
    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png"
         onclick="openFacebook()"
         class="fb-icon">
  </div>
</div>

<!-- أرقام التليفون -->
<div class="phones">
  <div class="phone" onclick="call('01022252741')">📞 01022252741</div>
  <div class="phone" onclick="call('01229535950')">📞 01229535950</div>
  <div class="phone" onclick="call('01102088131')">📞 01102088131</div>
  <div class="phone" onclick="call('01055101715')">📞 01055101715</div>
</div>

<script>
function toggleShare() {
  let box = document.getElementById("shareBox");
  box.style.display = (box.style.display === "block") ? "none" : "block";
}

function openFacebook() {
  window.open("https://www.facebook.com/people/Burger-F5ama/100087456030031/", "_blank");
}

function call(number) {
  window.location.href = "tel:" + number;
}
</script>

</body>
</html>
